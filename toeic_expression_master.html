<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>토익스피킹 표현 마스터</title>
<style>
  :root{
    --ink:#12181f;
    --panel:#1a232e;
    --panel2:#212c39;
    --line:#2c3948;
    --paper:#eef1f4;
    --amber:#ffb703;
    --amber-dim:#8a6a1f;
    --teal:#2dd4bf;
    --red:#ff6b6b;
    --muted:#8ca0b3;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--paper);
    font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",Helvetica,Arial,sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:760px;margin:0 auto;padding:22px 16px 60px;}

  .brand{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:4px;}
  .brand h1{
    font-size:20px;letter-spacing:.02em;margin:0;font-weight:800;
    font-family:Georgia,"Times New Roman",serif;
  }
  .brand h1 span{color:var(--amber);}
  .brand .sub{font-size:11px;color:var(--muted);}

  .statbar{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:16px 0 18px;
  }
  .stat{
    background:var(--panel);border:1px solid var(--line);border-radius:10px;
    padding:10px 8px;text-align:center;
  }
  .stat b{display:block;font-size:19px;color:var(--teal);font-variant-numeric:tabular-nums;}
  .stat span{font-size:10.5px;color:var(--muted);}

  .catbox{
    background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px;margin-bottom:14px;
  }
  .catbox .grouplabel{font-size:11px;color:var(--muted);margin:8px 0 6px;letter-spacing:.04em;}
  .grouplabel:first-child{margin-top:0;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;}
  .chip{
    border:1px solid var(--line);background:var(--panel2);color:var(--paper);
    padding:6px 10px;border-radius:999px;font-size:12.5px;cursor:pointer;user-select:none;
    transition:.15s;
  }
  .chip.active{background:var(--amber);color:#1a1200;border-color:var(--amber);font-weight:700;}
  .chip small{opacity:.65;margin-left:3px;}

  .modebar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .modebtn{
    flex:1;min-width:110px;background:var(--panel);border:1px solid var(--line);color:var(--paper);
    padding:9px;border-radius:9px;font-size:12.5px;cursor:pointer;
  }
  .modebtn.active{background:var(--teal);color:#062824;font-weight:700;border-color:var(--teal);}

  .card{
    background:linear-gradient(180deg,var(--panel2),var(--panel));
    border:1px solid var(--line);border-radius:16px;padding:26px 22px;
    min-height:230px;display:flex;flex-direction:column;justify-content:space-between;
    position:relative;overflow:hidden;
  }
  .card::before{
    content:attr(data-idx);
    position:absolute;top:14px;right:18px;font-size:11px;color:var(--muted);
    font-variant-numeric:tabular-nums;
  }
  .tag{
    display:inline-block;font-size:11px;color:var(--amber);border:1px solid var(--amber-dim);
    padding:2px 8px;border-radius:6px;margin-bottom:12px;letter-spacing:.03em;
  }
  .kr{font-size:21px;line-height:1.55;font-weight:600;margin-bottom:18px;}
  .prompt{font-size:12px;color:var(--muted);margin-bottom:10px;}
  .inputRow{display:flex;gap:8px;margin-bottom:10px;align-items:stretch;}
  .answerBox{
    flex:1;width:100%;background:#0d1319;border:1px solid var(--line);border-radius:10px;
    color:var(--paper);font-size:15.5px;padding:11px 12px;
    font-family:Georgia,"Times New Roman",serif;
  }
  .answerBox:focus{outline:2px solid var(--teal);}
  .micBtn{
    flex:0 0 48px;background:#0d1319;border:1px solid var(--line);border-radius:10px;
    color:var(--paper);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:.15s;position:relative;
  }
  .micBtn:hover{border-color:var(--teal);}
  .micBtn.recording{
    background:var(--red);border-color:var(--red);color:#2a0505;
    animation:pulse 1.1s infinite;
  }
  .micBtn.unsupported{opacity:.35;cursor:not-allowed;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(255,107,107,.55);}
    70%{box-shadow:0 0 0 9px rgba(255,107,107,0);}
    100%{box-shadow:0 0 0 0 rgba(255,107,107,0);}
  }
  .micStatus{font-size:11.5px;color:var(--muted);margin:-4px 0 10px;min-height:14px;}
  .micStatus.live{color:var(--teal);}
  .revealArea{
    background:#0d1319;border:1px dashed var(--line);border-radius:10px;
    padding:12px 13px;font-size:16px;line-height:1.5;font-family:Georgia,serif;
    margin-bottom:8px;display:none;
  }
  .revealArea.show{display:block;}
  .diffline{font-size:12.5px;color:var(--muted);margin-top:6px;font-family:-apple-system,sans-serif;}
  .ok{color:var(--teal);}
  .bad{color:var(--red);}

  .rowbtns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .btn{
    flex:1;min-width:90px;padding:10px 8px;border-radius:10px;border:none;
    font-size:13px;font-weight:700;cursor:pointer;
  }
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--paper);}
  .btn.reveal{background:var(--amber);color:#1a1200;}
  .btn.know{background:var(--teal);color:#062824;}
  .btn.unsure{background:#3a4553;color:var(--paper);}
  .btn.dontknow{background:var(--red);color:#2a0505;}

  .navrow{display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
  .navbtn{background:var(--panel);border:1px solid var(--line);color:var(--paper);
    padding:9px 16px;border-radius:9px;cursor:pointer;font-size:13px;}
  .progresswrap{flex:1;margin:0 12px;height:6px;background:var(--panel);border-radius:6px;overflow:hidden;}
  .progressfill{height:100%;background:var(--teal);width:0%;transition:.2s;}

  .foot{font-size:11px;color:var(--muted);text-align:center;margin-top:20px;line-height:1.6;}
  .resetlink{color:var(--muted);text-decoration:underline;cursor:pointer;}
</style>
</head>
<body>
<div class="wrap">

  <div class="brand">
    <h1>토익스피킹 <span>표현 마스터</span></h1>
  </div>
  <div class="sub">5개 PDF · 핵심구문 · 빈출주제 · 기초편 전체 표현 · 총 <span id="totalCountLabel">0</span>개 문장</div>

  <div class="statbar">
    <div class="stat"><b id="statTotal">0</b><span>전체 문장</span></div>
    <div class="stat"><b id="statMastered">0</b><span>완전 암기</span></div>
    <div class="stat"><b id="statLearning">0</b><span>학습중</span></div>
    <div class="stat"><b id="statNew">0</b><span>미학습</span></div>
  </div>

  <div class="catbox" id="catbox"></div>

  <div class="modebar">
    <button class="modebtn active" data-mode="all">전체 문장</button>
    <button class="modebtn" data-mode="weak">오답·미학습만</button>
    <button class="modebtn" data-mode="mastered">완전암기 복습</button>
  </div>

  <div class="card" id="card" data-idx="">
    <div>
      <div class="tag" id="cardTag">-</div>
      <div class="prompt">이 문장을 영어로 말해보세요 (소리 내어 말한 뒤 타이핑으로 확인하세요)</div>
      <div class="kr" id="krText">불러오는 중...</div>
      <div class="inputRow">
        <input class="answerBox" id="answerInput" placeholder="영어로 말하거나 타이핑해보세요" autocomplete="off">
        <button class="micBtn" id="micBtn" title="마이크로 녹음 시작">🎤</button>
      </div>
      <div class="micStatus" id="micStatus"></div>
      <div class="revealArea" id="revealArea"></div>
      <div class="diffline" id="diffLine"></div>
    </div>
    <div>
      <div class="rowbtns" id="preRevealBtns">
        <button class="btn reveal" id="revealBtn">정답 확인</button>
      </div>
      <div class="rowbtns" id="postRevealBtns" style="display:none;">
        <button class="btn dontknow" data-rate="0">몰랐어요</button>
        <button class="btn unsure" data-rate="1">헷갈렸어요</button>
        <button class="btn know" data-rate="2">알고있었어요</button>
      </div>
    </div>
  </div>

  <div class="navrow">
    <button class="navbtn" id="prevBtn">← 이전</button>
    <div class="progresswrap"><div class="progressfill" id="progressFill"></div></div>
    <button class="navbtn" id="shuffleBtn">🔀 섞기</button>
  </div>

  <div class="foot">
    진행 상황은 자동 저장됩니다 (이 기기/브라우저 기준) · <span class="resetlink" id="resetLink">전체 기록 초기화</span>
  </div>

</div>

};

const GROUP_ORDER = ["핵심구문편","빈출주제편 ①","빈출주제편 ②","기초편 ①","기초편 ②"];

/* build flat list */
let ALL = [];
Object.keys(DATA).forEach(catId=>{
  DATA[catId].items.forEach((it,i)=>{
    ALL.push({id: catId+"_"+i, cat:catId, kr:it[0], en:it[1], tag:it[2]||DATA[catId].title});
  });
});
document.getElementById('totalCountLabel').textContent = ALL.length;

/* ================= STATE ================= */
let progress = {}; // id -> {box:0-4, seen:0}
let activeCats = new Set(Object.keys(DATA)); // all selected by default
let mode = "all";
let queue = [];
let qi = 0;

async function loadProgress(){
  try{
    if(window.storage && typeof window.storage.get === 'function'){
      const res = await window.storage.get('toeic_progress_v1', false);
      if(res && res.value){ progress = JSON.parse(res.value); }
    }else{
      const raw = localStorage.getItem('toeic_progress_v1');
      if(raw){ progress = JSON.parse(raw); }
    }
  }catch(e){ progress = {}; }
  buildQueue();
  renderStats();
}
async function saveProgress(){
  try{
    if(window.storage && typeof window.storage.set === 'function'){
      await window.storage.set('toeic_progress_v1', JSON.stringify(progress), false);
    }else{
      localStorage.setItem('toeic_progress_v1', JSON.stringify(progress));
    }
  }catch(e){}
}

function boxOf(id){ return progress[id]?.box || 0; }

/* ================= UI: category chips ================= */
function renderCats(){
  const box = document.getElementById('catbox');
  box.innerHTML = "";
  let allChip = document.createElement('div');
  allChip.className = "chips";
  const allBtn = document.createElement('div');
  allBtn.className = "chip active";
  allBtn.id = "chipAll";
  allBtn.textContent = "전체 카테고리";
  allBtn.onclick = ()=>{
    activeCats = new Set(Object.keys(DATA));
    refreshChipStates();
    buildQueue();
  };
  allChip.appendChild(allBtn);
  box.appendChild(allChip);

  GROUP_ORDER.forEach(g=>{
    const label = document.createElement('div');
    label.className = "grouplabel";
    label.textContent = g;
    box.appendChild(label);
    const chips = document.createElement('div');
    chips.className = "chips";
    Object.keys(DATA).forEach(catId=>{
      if(DATA[catId].group !== g) return;
      const c = document.createElement('div');
      c.className = "chip active";
      c.dataset.cat = catId;
      c.innerHTML = DATA[catId].title + " <small>"+DATA[catId].items.length+"</small>";
      c.onclick = ()=>{
        if(activeCats.has(catId)){ activeCats.delete(catId); }
        else{ activeCats.add(catId); }
        if(activeCats.size===0){ activeCats.add(catId); }
        refreshChipStates();
        buildQueue();
      };
      chips.appendChild(c);
    });
    box.appendChild(chips);
  });
}
function refreshChipStates(){
  document.querySelectorAll('.chip[data-cat]').forEach(c=>{
    c.classList.toggle('active', activeCats.has(c.dataset.cat));
  });
  document.getElementById('chipAll').classList.toggle('active', activeCats.size===Object.keys(DATA).length);
}

/* ================= mode buttons ================= */
document.querySelectorAll('.modebtn').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('.modebtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
    buildQueue();
  };
});

/* ================= build queue ================= */
function buildQueue(){
  let pool = ALL.filter(it=>activeCats.has(it.cat));
  if(mode === "weak"){
    pool = pool.filter(it=> boxOf(it.id) < 3 );
  } else if(mode === "mastered"){
    pool = pool.filter(it=> boxOf(it.id) >= 3 );
  }
  // weighted shuffle: lower box appears earlier more often, but keep full pool
  pool.sort((a,b)=> boxOf(a.id) - boxOf(b.id) + (Math.random()-0.5)*1.5 );
  queue = pool;
  qi = 0;
  renderStats();
  showCard();
}

function shuffleQueue(){
  for(let i=queue.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [queue[i],queue[j]]=[queue[j],queue[i]];
  }
  qi = 0;
  showCard();
}
document.getElementById('shuffleBtn').onclick = shuffleQueue;

/* ================= render stats ================= */
function renderStats(){
  const pool = ALL.filter(it=>activeCats.has(it.cat));
  let mastered=0, learning=0, brandnew=0;
  pool.forEach(it=>{
    const b = boxOf(it.id);
    if(b>=3) mastered++;
    else if(b>0) learning++;
    else brandnew++;
  });
  document.getElementById('statTotal').textContent = pool.length;
  document.getElementById('statMastered').textContent = mastered;
  document.getElementById('statLearning').textContent = learning;
  document.getElementById('statNew').textContent = brandnew;
}

/* ================= card rendering ================= */
function showCard(){
  stopRecordingIfActive();
  const card = document.getElementById('card');
  const reveal = document.getElementById('revealArea');
  const diff = document.getElementById('diffLine');
  const answerInput = document.getElementById('answerInput');
  reveal.classList.remove('show');
  reveal.textContent = "";
  diff.textContent = "";
  answerInput.value = "";
  document.getElementById('preRevealBtns').style.display = "flex";
  document.getElementById('postRevealBtns').style.display = "none";

  if(queue.length === 0){
    card.dataset.idx = "";
    document.getElementById('cardTag').textContent = "해당 카드 없음";
    document.getElementById('krText').textContent = "선택한 조건에 맞는 문장이 없습니다. 카테고리나 모드를 바꿔보세요.";
    document.getElementById('progressFill').style.width = "0%";
    return;
  }
  if(qi >= queue.length) qi = 0;
  if(qi < 0) qi = queue.length-1;
  const it = queue[qi];
  card.dataset.idx = (qi+1)+" / "+queue.length;
  document.getElementById('cardTag').textContent = it.tag;
  document.getElementById('krText').textContent = it.kr;
  document.getElementById('progressFill').style.width = ((qi+1)/queue.length*100)+"%";
  answerInput.focus();
}

function doReveal(){
  stopRecordingIfActive();
  const it = queue[qi];
  if(!it) return;
  const reveal = document.getElementById('revealArea');
  reveal.textContent = it.en;
  reveal.classList.add('show');
  document.getElementById('preRevealBtns').style.display = "none";
  document.getElementById('postRevealBtns').style.display = "flex";

  const typed = document.getElementById('answerInput').value.trim();
  const diff = document.getElementById('diffLine');
  if(typed.length>0){
    const norm = s=>s.toLowerCase().replace(/[.,!?']/g,"").trim();
    if(norm(typed) === norm(it.en)){
      diff.innerHTML = '<span class="ok">✓ 정확히 일치합니다!</span>';
    }else{
      diff.innerHTML = '<span class="bad">다릅니다 — 정답과 비교해보세요.</span>';
    }
  }else{
    diff.textContent = "";
  }
}
document.getElementById('revealBtn').onclick = doReveal;
document.getElementById('answerInput').addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); doReveal(); }
});

document.querySelectorAll('#postRevealBtns .btn').forEach(btn=>{
  btn.onclick = async ()=>{
    const it = queue[qi];
    if(!it) return;
    const rate = parseInt(btn.dataset.rate,10); // 0 dontknow, 1 unsure, 2 know
    if(!progress[it.id]) progress[it.id] = {box:0, seen:0};
    progress[it.id].seen += 1;
    if(rate === 0) progress[it.id].box = Math.max(0, progress[it.id].box - 1);
    else if(rate === 1) progress[it.id].box = Math.min(4, progress[it.id].box);
    else progress[it.id].box = Math.min(4, progress[it.id].box + 1);
    await saveProgress();
    renderStats();
    qi++;
    if(qi >= queue.length){ buildQueue(); }
    else{ showCard(); }
  };
});

document.getElementById('prevBtn').onclick = ()=>{ qi--; showCard(); };

document.getElementById('resetLink').onclick = async ()=>{
  if(confirm("정말 모든 학습 기록을 초기화할까요? 되돌릴 수 없습니다.")){
    progress = {};
    await saveProgress();
    buildQueue();
  }
};

/* ================= speech recognition (mic → auto text) ================= */
const micBtn = document.getElementById('micBtn');
const micStatus = document.getElementById('micStatus');
const answerInputEl = document.getElementById('answerInput');
const SpeechRecognitionCtor = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognizer = null;
let isRecording = false;
let baseTextBeforeRecording = "";

if(!SpeechRecognitionCtor){
  micBtn.classList.add('unsupported');
  micBtn.title = "이 브라우저는 음성 인식을 지원하지 않습니다";
  micStatus.textContent = "이 브라우저에서는 음성 녹음이 지원되지 않아요. 타이핑으로 입력해주세요.";
}else{
  recognizer = new SpeechRecognitionCtor();
  recognizer.lang = "en-US";
  recognizer.continuous = true;
  recognizer.interimResults = true;

  recognizer.onstart = ()=>{
    isRecording = true;
    micBtn.classList.add('recording');
    micBtn.textContent = "⏹";
    micStatus.textContent = "듣고 있어요... 영어로 말해보세요.";
    micStatus.classList.add('live');
  };

  recognizer.onresult = (event)=>{
    let finalChunk = "";
    let interimChunk = "";
    for(let i=event.resultIndex; i<event.results.length; i++){
      const transcript = event.results[i][0].transcript;
      if(event.results[i].isFinal){ finalChunk += transcript; }
      else{ interimChunk += transcript; }
    }
    if(finalChunk){
      baseTextBeforeRecording = (baseTextBeforeRecording + " " + finalChunk).trim();
    }
    answerInputEl.value = (baseTextBeforeRecording + " " + interimChunk).trim();
  };

  recognizer.onerror = (event)=>{
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = "🎤";
    micStatus.classList.remove('live');
    if(event.error === 'not-allowed' || event.error === 'service-not-allowed'){
      micStatus.textContent = "마이크 권한이 거부되었습니다. 브라우저 설정에서 마이크 접근을 허용해주세요.";
    }else if(event.error === 'no-speech'){
      micStatus.textContent = "음성이 감지되지 않았어요. 다시 시도해보세요.";
    }else{
      micStatus.textContent = "음성 인식 중 오류가 발생했습니다 (" + event.error + "). 타이핑으로 입력해주세요.";
    }
  };

  recognizer.onend = ()=>{
    isRecording = false;
    micBtn.classList.remove('recording');
    micBtn.textContent = "🎤";
    if(micStatus.classList.contains('live')){
      micStatus.textContent = "녹음이 끝났어요. 결과를 확인하고 필요하면 수정하세요.";
      micStatus.classList.remove('live');
    }
  };

  micBtn.onclick = ()=>{
    if(isRecording){
      recognizer.stop();
      return;
    }
    baseTextBeforeRecording = answerInputEl.value.trim();
    try{
      recognizer.start();
    }catch(e){
      micStatus.textContent = "녹음을 시작할 수 없습니다. 잠시 후 다시 시도해주세요.";
    }
  };
}

function stopRecordingIfActive(){
  if(isRecording && recognizer){ recognizer.stop(); }
}

/* ================= init ================= */
renderCats();
loadProgress();
</script>
